<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ALORNIX - Creative Portfolio Template" />
    <title>DevKemal | Fullstack Web Developer Portfolio</title>

    <link
      rel="preload"
      as="style"
      href="https://devkemal.github.io/assets/style.css"
    />
    <link rel="stylesheet" href="https://devkemal.github.io/assets/style.css" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>

    <link
      rel="icon"
      type="image/x-icon"
      href="https://devkemal.github.io/favicon.ico"
    />
  </head>

  <body class="bg-[#F2F2F2] text-black relative">
    <!-- Navigation -->
    <nav
      class="fixed top-0 w-full z-50 p-6 md:p-8 backdrop-blur-lg bg-[#F2F2F2]/50 text-black transition-colors duration-300"
    >
      <div class="flex justify-between items-center relative z-50">
        <a
          href="https://devkemal.github.io/en"
          class="display-font text-2xl font-bold tracking-tighter hover:opacity-70 transition"
          id="logo"
          >DEVKEMAL</a
        >

        <!-- Mobile Menu Button -->
        <button
          class="md:hidden flex flex-col gap-1.5 z-50"
          onclick="toggleMenu()"
          id="menu_burger"
        >
          <span class="w-8 h-0.5 bg-current"></span>
          <span class="w-8 h-0.5 bg-current"></span>
          <span class="w-8 h-0.5 bg-current"></span>
        </button>

        <!-- Desktop Menu -->
        <div
          class="hidden md:flex text-sm font-medium tracking-wide text-black"
        >
          <a
            href="https://devkemal.github.io/tr/contact?view=home.contact&amp;status=200"
            class="nav-link"
          >
            TÜRKÇE
          </a>
          <a href="https://devkemal.github.io/en" class="nav-link"> My Work </a>
          <a href="https://devkemal.github.io/en/about" class="nav-link">
            Me
          </a>
          <a href="mailto:devkemal.contact@gmail.com" class="nav-link">
            Contact
          </a>
        </div>
      </div>

      <!-- Mobile Menu Overlay -->
      <div
        id="mobile-menu"
        class="fixed h-screen w-screen inset-0 bg-black text-white flex flex-col items-center justify-center gap-8 -translate-y-full transition-transform duration-500 ease-in-out md:hidden z-40"
      >
        <a
          href="https://devkemal.github.io/en"
          class="display-font text-4xl font-bold hover:text-gray-300 transition uppercase tracking-wide"
          onclick="toggleMenu()"
        >
          My Work
        </a>
        <a
          href="https://devkemal.github.io/en/about"
          class="display-font text-4xl font-bold hover:text-gray-300 transition uppercase tracking-wide"
          onclick="toggleMenu()"
        >
          Me
        </a>
        <a
          href="mailto:devkemal.contact@gmail.com"
          class="display-font text-4xl font-bold hover:text-gray-300 transition uppercase tracking-wide"
          onclick="toggleMenu()"
        >
          Contact
        </a>
      </div>
    </nav>

    <section class="h-screen flex items-center justify-center px-4 pt-40">
      <div class="text-center w-full max-w-2xl">
        <h1 class="display-font text-4xl md:text-5xl font-bold mb-12">
          SAY HELLO
        </h1>

        <form class="space-y-12 text-left" name="contact" netlify>
          <div class="relative group">
            <input
              type="text"
              name="name"
              class="w-full bg-transparent border-b-2 border-black/10 py-4 text-xl focus:outline-none focus:border-black transition"
              placeholder=" "
              required
            />
            <label
              class="absolute left-0 top-4 text-gray-400 text-xl pointer-events-none transition-all group-focus-within:-top-6 group-focus-within:text-xs group-focus-within:text-black"
              >Your Name</label
            >
          </div>

          <div class="relative group">
            <input
              type="email"
              name="email"
              class="w-full bg-transparent border-b-2 border-black/10 py-4 text-xl focus:outline-none focus:border-black transition"
              placeholder=" "
              required
            />
            <label
              class="absolute left-0 top-4 text-gray-400 text-xl pointer-events-none transition-all group-focus-within:-top-6 group-focus-within:text-xs group-focus-within:text-black"
              >Your Email</label
            >
          </div>

          <div class="relative group">
            <textarea
              rows="5"
              name="body"
              class="w-full bg-transparent border-b-2 border-black/10 py-4 text-xl focus:outline-none focus:border-black transition resize-none"
              placeholder=" "
              required
            ></textarea>
            <label
              class="absolute left-0 top-4 text-gray-400 text-xl pointer-events-none transition-all group-focus-within:-top-6 group-focus-within:text-xs group-focus-within:text-black"
              >Tell us about your project</label
            >
          </div>

          <div class="text-center pt-8">
            <button
              type="submit"
              class="inline-block border border-black px-12 py-4 text-sm font-bold uppercase tracking-widest hover:bg-black hover:text-white transition duration-500"
            >
              Send Message
            </button>
          </div>
        </form>
      </div>
    </section>

    <footer class="py-20 border-t border-gray-300">
      <div class="container mx-auto px-4 text-center">
        <a
          href="mailto:devkemal.contact@gmail.com"
          class="display-font uppercase block text-6xl md:text-8xl font-bold mb-12 hover:text-gray-500 transition cursor-pointer"
        >
          Contact
        </a>

        <div
          class="flex justify-center gap-12 text-sm uppercase tracking-widest font-bold"
        >
          <a
            href="https://github.com/devKemal"
            target="_blank"
            class="hover:line-through"
            >Github</a
          ><a
            href="https://www.behance.net/kemalozvarol"
            target="_blank"
            class="hover:line-through"
            >Behance</a
          >
          <a href="mailto:devkemal.contact@gmail.com" class="hover:line-through"
            >Email</a
          >
        </div>

        <div class="mt-20 text-xs text-gray-500 font-medium">
          &copy; 2026 Alornix Canvas.
        </div>
      </div>
    </footer>

    <script>
      function toggleMenu() {
        const menu = document.getElementById("mobile-menu");
        menu.classList.toggle("-translate-y-full");
        window.logo.classList.toggle("text-white");
        window.menu_burger.classList.toggle("text-white");
      }
      console.log(navigator.language);

      // if (window.location.pathname === '/') {
      //     const lang = navigator.language.startsWith('tr') ? 'tr' : 'en';
      //     window.location.href = '/' + lang + '/';
      // }
    </script>
  </body>
</html>
